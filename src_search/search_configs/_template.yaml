# Search spec template — copy this file, rename, then uncomment the dims you
# want to search this run. Two parallel runs (different output_roots, different
# spec files) do not interfere because spec is per-run input data.
#
# Two sampler types are available:
#   scalar_pair  -> samples one v in range, emits [v, v]
#                   (used for outer_r, brightness, gaussian_sigma, all
#                    Zernike aberrations, aperture geometry)
#   range_pair   -> samples low + width, emits [[low, low+width]]
#                   (used for intensity_abs)
#
# `decimals` controls rounding: 0 -> python int, >=1 -> rounded float.

