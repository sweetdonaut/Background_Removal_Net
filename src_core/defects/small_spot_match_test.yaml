# Small bright spot, no aberration. Designed to match the gaussian (3,3,
# sigma=1.3) +/- 70 defect used in make_channel_test.py so the train/test
# defect distributions are aligned for the channel-combination probe.
n_samples: 1000
psf_size: 256
crop_size: 32
pixel_oversample: 4

# Tight diffraction-limited spot (full aperture)
outer_r: [60, 60]
epsilon: [0, 0]
ellipticity: [0, 0]
ellip_angle: [0, 0]
square_eps: [0, 0]
h_stripe_w: [0, 0]
v_stripe_w: [0, 0]
h_outer_crop: [0, 0]
v_outer_crop: [0, 0]

# Vector mode + linear polarization, no aberration (same as trial_001)
vector_mode: true
na: [0.95, 0.95]
pol_type: linX

defocus: [0, 0]
astig_x: [0, 0]
astig_y: [0, 0]
coma_x: [0, 0]
coma_y: [0, 0]
spherical: [0, 0]
trefoil_x: [0, 0]
trefoil_y: [0, 0]

# Intensity matches the synthetic test injection range (+/- 70)
intensity_abs: [60, 80]

brightness: [5000, 5000]
background: [5, 5]
poisson_noise: true
gaussian_sigma: [1.5, 1.5]

threshold_multiplier: 1.0
output_dir: output
